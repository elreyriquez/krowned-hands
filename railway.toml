# Railway deploy config: https://docs.railway.com/deploy/config-as-code
# After deploy: set ADMIN_PASSWORD (+ optional vars from `.env.example`) in Railway → Variables.

[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
